<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RePanel</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #020617;
  color: white;
}

/* Tela cheia estilo app */
.screen {
  height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 25px;
}

/* Ícone */
.lock {
  width: 110px;
  margin: 0 auto 30px;
  filter: drop-shadow(0 0 15px rgba(0,255,255,0.6));
}

/* Título */
.title {
  text-align: center;
  font-size: 24px;
  margin-bottom: 25px;
  letter-spacing: 1px;
}

/* Input grande (mobile) */
input {
  width: 100%;
  padding: 18px;
  font-size: 18px;
  border-radius: 14px;
  border: none;
  outline: none;
  text-align: center;
  background: rgba(255,255,255,0.05);
  color: white;
}

/* Botões estilo app */
button {
  width: 100%;
  padding: 18px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  margin-top: 12px;
  background: linear-gradient(135deg, #22d3ee, #3b82f6);
  color: white;
}

/* Press effect */
button:active {
  transform: scale(0.96);
}

/* Painel escondido */
.panel {
  display: none;
}

/* Erro */
.error {
  text-align: center;
  margin-top: 12px;
  color: #ff6b6b;
  display: none;
}

</style>
</head>

<body>

<!-- Lock -->
<div class="screen" id="lockScreen">
  <img class="lock" src="https://img.icons8.com/ios7/512/FFFFFF/lock.png">
  <div class="title">RePanel</div>
  
  <input type="password" id="password" placeholder="Código de acesso">
  <div class="error" id="errorMsg">Código incorreto</div>
</div>

<!-- Painel -->
<div class="screen panel" id="panel">
  <div class="title">Bem-vindo</div>
  <button>Botão 1</button>
  <button>Botão 2</button>
  <button>Botão 3</button>
</div>

<script>
const input = document.getElementById("password");
const error = document.getElementById("errorMsg");

input.addEventListener("change", () => {
  if (input.value === "2560") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("panel").style.display = "flex";
  } else {
    error.style.display = "block";
    input.value = "";
  }
});
</script>

</body>
</html>
