<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RePanel</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

.container {
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 250px;
    background: #1e293b;
    padding: 20px;
    box-shadow: 2px 0 10px rgba(0,0,0,0.5);
}

.sidebar h1 {
    font-size: 22px;
    margin-bottom: 20px;
}

.item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #334155;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    transition: 0.2s;
}

.item:hover {
    background: #475569;
}

.switch {
    position: relative;
    width: 45px;
    height: 22px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: #64748b;
    border-radius: 20px;
    transition: 0.3s;
}

.slider:before {
    position: absolute;
    content: "";
    height: 16px;
    width: 16px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
}

input:checked + .slider {
    background: #22c55e;
}

input:checked + .slider:before {
    transform: translateX(23px);
}
</style>
</head>

<body>

<div class="container">
    <div class="sidebar">
        <h1>RePanel</h1>

        <div class="item">
            <span>Modo Noturno</span>
            <label class="switch">
                <input type="checkbox" id="switch1">
                <span class="slider"></span>
            </label>
        </div>

        <div class="item">
            <span>Notificações</span>
            <label class="switch">
                <input type="checkbox" id="switch2">
                <span class="slider"></span>
            </label>
        </div>

        <div class="item">
            <span>Som</span>
            <label class="switch">
                <input type="checkbox" id="switch3">
                <span class="slider"></span>
            </label>
        </div>

        <div class="item">
            <span>Auto Save</span>
            <label class="switch">
                <input type="checkbox" id="switch4">
                <span class="slider"></span>
            </label>
        </div>

        <div class="item">
            <span>Modo Gamer</span>
            <label class="switch">
                <input type="checkbox" id="switch5">
                <span class="slider"></span>
            </label>
        </div>

    </div>
</div>

<script>
// lista de switches
const switches = ["switch1","switch2","switch3","switch4","switch5"];

// carregar estado salvo
switches.forEach(id => {
    const el = document.getElementById(id);
    const saved = localStorage.getItem(id);

    if (saved === "true") {
        el.checked = true;
    }

    // salvar quando mudar
    el.addEventListener("change", () => {
        localStorage.setItem(id, el.checked);
    });
});
</script>

</body>
</html>
